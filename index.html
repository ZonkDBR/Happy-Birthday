<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday, Rara 🤍</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     ROOT & RESET
  ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blush: #f5c6d0;
    --blush-light: #fde8ed;
    --lavender: #d8c9e8;
    --lavender-light: #ede5f5;
    --cream: #fdf6f0;
    --cream-deep: #f5ede3;
    --rose: #d4778a;
    --rose-deep: #b55470;
    --mauve: #9b7fa8;
    --text-dark: #3a2a35;
    --text-mid: #6b4f5e;
    --text-light: #9c7f8e;
    --shadow: 0 8px 40px rgba(180,120,140,0.13);
    --shadow-strong: 0 16px 60px rgba(180,120,140,0.22);
    --radius: 20px;
    --max-w: 760px;
  }

  html { scroll-behavior: smooth; font-size: 16px; }
  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    overflow-x: hidden;
    line-height: 1.7;
  }

  /* ============================================================
     SCROLL PROGRESS BAR
  ============================================================ */
  #progress-bar {
    position: fixed; top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--rose), var(--mauve));
    width: 0%; z-index: 1000;
    transition: width 0.1s linear;
  }

  /* ============================================================
   MUSIC INTRO OVERLAY
============================================================ */

#music-overlay {
  position: fixed;
  inset: 0;
  background: rgba(253, 246, 240, 0.96);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5000;
  animation: fadeIn 0.6s ease;
}

.music-box {
  background: white;
  padding: 40px 32px;
  border-radius: 20px;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 16px 60px rgba(180,120,140,0.22);
}

.music-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  color: #6b4f5e;
  margin-bottom: 30px;
  line-height: 1.6;
}

.music-actions {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.music-btn {
  padding: 14px 20px;
  border-radius: 50px;
  border: 1.5px solid #d4778a;
  background: transparent;
  cursor: pointer;
  font-family: 'Jost', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: all 0.3s ease;
}

.music-btn.primary {
  background: linear-gradient(135deg, #d4778a, #9b7fa8);
  color: white;
  border: none;
}

.music-btn:hover {
  transform: scale(1.04);
}

  /* ============================================================
     FIXED CONTROLS (music + language toggle)
  ============================================================ */
  #fixed-controls {
    position: fixed;
    bottom: 28px; right: 28px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
  }

  #song-title {
    font-size: 11px;
    max-width: 120px;
    text-align: center;
    color: #b54470;
    font-family: 'Jost', sans-serif;
    line-height: 1.3;
  }

  .music-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .ctrl-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1.5px solid var(--blush);
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(10px);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    font-family: 'Jost', sans-serif;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--rose-deep);
    box-shadow: 0 4px 20px rgba(180,120,140,0.18);
    transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
    user-select: none;
  }
  .ctrl-btn:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(180,120,140,0.3); }
  .ctrl-btn.lang-active { background: linear-gradient(135deg, var(--rose), var(--mauve)); color: #fff; border-color: transparent; }

  /* ============================================================
     ANIMATIONS
  ============================================================ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes floatHeart {
    0%   { transform: translateY(0) rotate(-10deg) scale(1); opacity: 0.7; }
    50%  { transform: translateY(-18px) rotate(10deg) scale(1.1); opacity: 1; }
    100% { transform: translateY(0) rotate(-10deg) scale(1); opacity: 0.7; }
  }
  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 18px rgba(212,119,138,0.4); }
    50%       { box-shadow: 0 0 36px rgba(212,119,138,0.7), 0 0 60px rgba(155,127,168,0.3); }
  }
  @keyframes particleFloat {
    0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0.6; }
    33%  { transform: translateY(-30px) translateX(15px) scale(1.2); opacity: 1; }
    66%  { transform: translateY(-15px) translateX(-10px) scale(0.9); opacity: 0.8; }
    100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.6; }
  }
  @keyframes blink {
    0%, 100% { border-color: var(--rose); }
    50%       { border-color: transparent; }
  }
  @keyframes heartBeat {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.25); }
  }
  @keyframes langFlip {
    0%   { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .reveal {
    opacity: 0; transform: translateY(28px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* lang transition on all i18n elements */
  [data-i18n], [data-i18n-html] {
    transition: opacity 0.25s ease;
  }
  .lang-switching [data-i18n],
  .lang-switching [data-i18n-html] {
    opacity: 0;
  }

  /* ============================================================
     SECTION SHARED
  ============================================================ */
  section { padding: 100px 24px; }
  .container { max-width: var(--max-w); margin: 0 auto; }
  .section-label {
    font-family: 'Jost', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 14px;
  }
  h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    color: var(--text-dark);
    line-height: 1.25;
    margin-bottom: 24px;
  }

  /* ============================================================
     HERO SECTION
  ============================================================ */
  #hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 40px 24px;
    position: relative; overflow: hidden;
    background: linear-gradient(-45deg, #fde8ed, #ede5f5, #fdf6f0, #f5e8ef, #e8d8f5);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
  }
  .heart-bg {
    position: absolute; font-size: 1.5rem; opacity: 0.18;
    animation: floatHeart ease-in-out infinite;
    pointer-events: none; user-select: none;
  }
  .hero-inner {
    position: relative; z-index: 2;
    animation: fadeUp 1.2s ease 0.3s both;
  }
  .hero-tag {
    display: inline-block;
    font-family: 'Jost', sans-serif;
    font-size: 0.72rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--rose); background: rgba(255,255,255,0.6);
    border: 1px solid var(--blush); padding: 7px 18px;
    border-radius: 50px; margin-bottom: 30px; backdrop-filter: blur(6px);
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    font-weight: 300; color: var(--text-dark);
    line-height: 1.12; margin-bottom: 22px; letter-spacing: -0.01em;
  }
  .hero-title em { font-style: italic; color: var(--rose-deep); }
  .hero-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.05rem, 2.5vw, 1.35rem); font-style: italic;
    color: var(--text-mid); max-width: 520px;
    margin: 0 auto 44px; line-height: 1.65;
  }
  .btn-primary {
    display: inline-block; padding: 15px 40px;
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    color: #fff; border: none; border-radius: 60px;
    font-family: 'Jost', sans-serif; font-size: 0.88rem;
    letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
    animation: glowPulse 2.5s ease-in-out infinite;
    transition: transform 0.3s; text-decoration: none;
  }
  .btn-primary:hover { transform: scale(1.05); }
  .scroll-hint {
    position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: var(--text-light); font-size: 0.72rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    animation: fadeIn 1s ease 2s both;
  }
  .scroll-hint::after {
    content: ''; display: block; width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--rose), transparent);
  }

  /* ============================================================
     LETTER SECTION
  ============================================================ */
  #letter { background: var(--cream-deep); }
  .letter-card {
    background: #fff; border-radius: var(--radius);
    padding: clamp(32px, 6vw, 64px);
    box-shadow: var(--shadow-strong); position: relative; overflow: hidden;
  }
  .letter-card::before {
    content: '❝'; font-family: 'Cormorant Garamond', serif;
    font-size: 8rem; color: var(--blush);
    position: absolute; top: -10px; left: 16px; opacity: 0.4; line-height: 1;
  }
  .letter-date {
    font-size: 0.75rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text-light); margin-bottom: 32px;
  }
  .letter-p {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.05rem, 2.2vw, 1.25rem);
    color: var(--text-mid); line-height: 1.85; margin-bottom: 24px;
  }
  #typed-line {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.05rem, 2.2vw, 1.25rem);
    color: var(--text-mid); line-height: 1.85; margin-bottom: 24px;
    border-right: 2px solid var(--rose);
    animation: blink 0.8s step-end infinite;
    display: inline; white-space: pre-wrap;
  }
  .letter-sign {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.4rem; color: var(--rose-deep); margin-top: 36px;
  }

  /* ============================================================
     TIMELINE SECTION
  ============================================================ */
  #timeline { background: var(--lavender-light); }
  .timeline-wrap { position: relative; }
  .timeline-wrap::before {
    content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
    width: 1px; background: linear-gradient(to bottom, transparent, var(--blush), var(--lavender), transparent);
    transform: translateX(-50%);
  }
  .tl-item {
    display: grid; grid-template-columns: 1fr 40px 1fr;
    gap: 0 20px; margin-bottom: 60px; align-items: start;
    opacity: 0; transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .tl-item.visible { opacity: 1 !important; transform: translateX(0) !important; }
  .tl-item:nth-child(odd)  { transform: translateX(-30px); }
  .tl-item:nth-child(even) { transform: translateX(30px); }
  .tl-content { background: #fff; border-radius: 16px; padding: 28px; box-shadow: var(--shadow); }
  .tl-item:nth-child(even) .tl-content  { grid-column: 3; }
  .tl-item:nth-child(even) .tl-spacer   { grid-column: 1; grid-row: 1; }
  .tl-item:nth-child(even) .tl-dot-wrap { grid-column: 2; grid-row: 1; }
  .tl-dot-wrap { display: flex; align-items: flex-start; justify-content: center; padding-top: 22px; }
  .tl-dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    box-shadow: 0 0 0 4px rgba(212,119,138,0.2); flex-shrink: 0;
  }
  .tl-image {
    width: 100%; height: 110px; border-radius: 10px;
    background: linear-gradient(135deg, var(--blush-light), var(--lavender-light));
    margin-bottom: 16px; display: flex; align-items: center; justify-content: center;
    color: var(--text-light); font-size: 1.5rem;
  }
  .tl-title { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }
  .tl-desc { font-size: 0.9rem; color: var(--text-mid); line-height: 1.65; }

  @media (max-width: 640px) {
    .timeline-wrap::before { left: 20px; transform: none; }
    .tl-item { grid-template-columns: 40px 1fr; }
    .tl-dot-wrap { grid-column: 1 !important; grid-row: 1 !important; }
    .tl-content { grid-column: 2 !important; grid-row: 1 !important; }
    .tl-spacer { display: none; }
    .tl-item:nth-child(odd), .tl-item:nth-child(even) { transform: translateX(-20px); }
  }

  /* ============================================================
     SUPPORT SECTION
  ============================================================ */
  #support { background: var(--cream); text-align: center; }
  .support-msg-box {
    min-height: 80px; display: flex;
    align-items: center; justify-content: center;
    margin: 36px auto; max-width: 540px;
  }
  .support-msg {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 3.5vw, 1.9rem); font-style: italic;
    color: var(--text-dark);
    transition: opacity 0.5s ease, transform 0.5s ease;
    line-height: 1.5;
  }
  .support-msg.fade-out { opacity: 0; transform: translateY(-8px); }
  .support-msg.fade-in  { opacity: 1; transform: translateY(0); }
  .btn-support {
    padding: 16px 44px; background: transparent;
    border: 1.5px solid var(--rose); border-radius: 60px;
    color: var(--rose-deep); font-family: 'Jost', sans-serif;
    font-size: 0.88rem; letter-spacing: 0.12em;
    text-transform: uppercase; cursor: pointer;
    transition: background 0.35s, color 0.35s, box-shadow 0.35s;
  }
  .btn-support:hover { background: var(--rose); color: #fff; box-shadow: 0 0 28px rgba(212,119,138,0.4); }
  .click-count { margin-top: 20px; font-size: 0.78rem; color: var(--text-light); letter-spacing: 0.1em; }

  /* ============================================================
     HOPE SECTION
  ============================================================ */
  #hope {
    background: linear-gradient(160deg, #f5e8ef 0%, #ede5f5 100%);
    position: relative; overflow: hidden; text-align: center;
  }
  .particles-wrap { position: absolute; inset: 0; pointer-events: none; }
  .particle { position: absolute; border-radius: 50%; background: rgba(212,119,138,0.25); animation: particleFloat ease-in-out infinite; }
  .hope-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.05rem, 2.3vw, 1.3rem); color: var(--text-mid);
    line-height: 1.85; max-width: 620px; margin: 0 auto 24px;
  }
  .hope-steps { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin-top: 36px; }
  .hope-step {
    background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
    border: 1px solid var(--blush); border-radius: 14px;
    padding: 18px 22px; max-width: 200px; text-align: center;
  }
  .hope-step-icon { font-size: 1.6rem; margin-bottom: 8px; }
  .hope-step-label { font-size: 0.85rem; color: var(--text-mid); line-height: 1.5; }

  /* ============================================================
     HIDDEN PSSST
  ============================================================ */
  #pssst {
    display: inline-block; cursor: pointer;
    font-size: 0.72rem; color: var(--text-light);
    letter-spacing: 0.12em; opacity: 0.5;
    transition: opacity 0.3s; margin-top: 40px;
  }
  #pssst:hover { opacity: 1; }

  /* ============================================================
     MODAL
  ============================================================ */
  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(58,42,53,0.55); backdrop-filter: blur(6px);
    z-index: 2000; align-items: center; justify-content: center;
    padding: 24px; animation: fadeIn 0.4s ease;
  }
  #modal-overlay.open { display: flex; }
  .modal-card {
    background: #fff; border-radius: var(--radius);
    padding: clamp(30px, 6vw, 56px); max-width: 520px; width: 100%;
    box-shadow: var(--shadow-strong); position: relative;
    animation: fadeUp 0.45s ease;
  }
  .modal-close {
    position: absolute; top: 18px; right: 20px;
    background: none; border: none; font-size: 1.4rem;
    cursor: pointer; color: var(--text-light); transition: color 0.2s;
  }
  .modal-close:hover { color: var(--rose); }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem; font-weight: 400; color: var(--text-dark); margin-bottom: 28px;
  }
  .promise-list { list-style: none; display: flex; flex-direction: column; gap: 16px; }
  .promise-list li {
    display: flex; gap: 14px; align-items: flex-start;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.08rem; color: var(--text-mid); line-height: 1.6;
  }
  .promise-list li::before { content: '🤍'; flex-shrink: 0; margin-top: 2px; }

  /* ============================================================
     FOOTER
  ============================================================ */
  footer {
    padding: 60px 24px; text-align: center;
    background: var(--cream-deep); border-top: 1px solid var(--blush);
  }
  .footer-heart { font-size: 1.4rem; display: inline-block; animation: heartBeat 1.4s ease-in-out infinite; margin: 0 6px; }
  .footer-text { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--text-mid); }
  .footer-year { margin-top: 10px; font-size: 0.75rem; color: var(--text-light); letter-spacing: 0.1em; }

  /* ============================================================
   MOBILE FIX
  ============================================================ */

  @media (max-width: 768px) {

    #music-btn,
    #language-btn {
      position: fixed;
      bottom: 15px;
      top: auto;
      padding: 10px 14px;
      font-size: 0.75rem;
    }

    #music-btn {
      right: 15px;
    }

    #language-btn {
      left: 15px;
    }
  }
</style>
</head>
<body>

<!-- Scroll progress bar -->
<div id="progress-bar"></div>

<!-- Fixed controls: language + music -->
<div id="fixed-controls">
  <div class="music-wrapper">
    <button class="ctrl-btn" id="music-btn">🎵</button>
    <div id="song-title"></div>
  </div>
  <button class="ctrl-btn lang-active" id="lang-btn">ID</button>
</div>
<audio id="bg-music"></audio>

<!-- ============================================================
     MUSIC INTRO OVERLAY
============================================================ -->
<div id="music-overlay">
  <div class="music-box">
    <p class="music-text">
      🤍 This little surprise feels warmer with music.<br>
      Would you like to play it while you read?
    </p>
    <div class="music-actions">
      <button id="music-yes" class="music-btn primary">Yes, play it 🎵</button>
      <button id="music-no" class="music-btn">Continue without music</button>
    </div>
  </div>
</div>

<!-- ============================================================
     HERO SECTION
============================================================ -->
<section id="hero">
  <div class="heart-bg" style="top:10%;left:8%;font-size:2rem;animation-duration:5.2s;animation-delay:0s">🤍</div>
  <div class="heart-bg" style="top:20%;left:85%;font-size:1.2rem;animation-duration:6.5s;animation-delay:1s">🌸</div>
  <div class="heart-bg" style="top:75%;left:12%;font-size:1rem;animation-duration:7s;animation-delay:2s">🤍</div>
  <div class="heart-bg" style="top:65%;left:80%;font-size:2.2rem;animation-duration:5.8s;animation-delay:0.5s">🌸</div>
  <div class="heart-bg" style="top:45%;left:5%;font-size:1.4rem;animation-duration:6s;animation-delay:1.5s">🤍</div>
  <div class="heart-bg" style="top:50%;left:92%;font-size:1.1rem;animation-duration:8s;animation-delay:3s">🌸</div>
  <div class="heart-bg" style="top:88%;left:55%;font-size:1.3rem;animation-duration:6.2s;animation-delay:0.8s">🤍</div>
  <div class="heart-bg" style="top:5%;left:48%;font-size:0.9rem;animation-duration:7.5s;animation-delay:2.5s">🌸</div>

  <div class="hero-inner">
    <div class="hero-tag" data-i18n="hero.tag"></div>
    <h1 class="hero-title">Happy Birthday,<br><em>Rara</em> 🤍</h1>
    <p class="hero-subtitle" data-i18n="hero.subtitle"></p>
    <a class="btn-primary" href="#letter" onclick="document.getElementById('letter').scrollIntoView({behavior:'smooth'});if(!playing){playMusic();}return false;" data-i18n="hero.cta"></a>
  </div>
  <div class="scroll-hint" data-i18n="hero.scroll"></div>
</section>

<!-- ============================================================
     LETTER SECTION
============================================================ -->
<section id="letter">
  <div class="container">
    <p class="section-label reveal" data-i18n="letter.label"></p>
    <h2 class="reveal" data-i18n-html="letter.heading"></h2>
    <div class="letter-card reveal">
      <div class="letter-date" data-i18n="letter.date"></div>
      <div id="typed-line"></div>
      <p class="letter-p" id="letter-rest" style="opacity:0;transition:opacity 1s ease 0.5s" data-i18n="letter.p1"></p>

  /* ============================================================
     LANGUAGE SYSTEM
  ============================================================ */
  let currentLang = 'en'; // default Indonesian

  function applyLang(lang) {
    const t = T[lang];

    // Update all data-i18n (text)
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.textContent = t[key];
    });

    // Update all data-i18n-html (innerHTML for italic etc)
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const key = el.getAttribute('data-i18n-html');
      if (t[key] !== undefined) el.innerHTML = t[key];
    });

    // Update support placeholder if no clicks yet
    if (msgCount === 0) {
      document.getElementById('support-msg').textContent = t['support.placeholder'];
    }

    // Update lang button label
    const btn = document.getElementById('lang-btn');
    btn.textContent = lang === 'id' ? 'EN' : 'ID';

    // Update html lang attr
    document.documentElement.lang = lang === 'id' ? 'id' : 'en';
  }

  function toggleLang() {
    currentLang = currentLang === 'id' ? 'en' : 'id';
    // Brief fade transition
    document.body.classList.add('lang-switching');
    setTimeout(() => {
      applyLang(currentLang);
      document.body.classList.remove('lang-switching');
    }, 220);
  }

  /* ============================================================
     SCROLL PROGRESS BAR
  ============================================================ */
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.body.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
  });

  /* ============================================================
     INTERSECTION OBSERVERS
  ============================================================ */
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); revealObserver.unobserve(e.target); }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

  const letterObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        document.querySelectorAll('[data-delayed]').forEach(el => el.style.opacity = '1');
        document.getElementById('letter-rest').style.opacity = '1';
        letterObserver.disconnect();
      }
    });
  }, { threshold: 0.1 });
  letterObserver.observe(document.getElementById('letter'));

  const tlObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); tlObserver.unobserve(e.target); }
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.tl-item').forEach((el, i) => {
    el.style.transitionDelay = (i * 0.15) + 's';
    tlObserver.observe(el);
  });

  /* ============================================================
     TYPING ANIMATION
  ============================================================ */
  const typedEl = document.getElementById('typed-line');
  let typedIndex = 0;
  let typedStarted = false;

  function typeChar() {
    const text = T[currentLang]['letter.typed'];
    if (typedIndex < text.length) {
      typedEl.textContent += text[typedIndex];
      typedIndex++;
      setTimeout(typeChar, 48);
    } else {
      typedEl.style.borderRight = '2px solid transparent';
    }
  }

  const typeObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting && !typedStarted) {
        typedStarted = true;
        setTimeout(typeChar, 600);
        typeObserver.disconnect();
      }
    });
  }, { threshold: 0.2 });
  typeObserver.observe(document.getElementById('letter'));

  /* ============================================================
     SUPPORT MESSAGES
  ============================================================ */
  let msgCount = 0;
  const msgEl = document.getElementById('support-msg');
  const countEl = document.getElementById('click-count');

  function nextMessage() {
    msgCount++;
    const msgs = T[currentLang]['support.messages'];
    const idx = (msgCount - 1) % msgs.length;
    msgEl.classList.add('fade-out');
    setTimeout(() => {
      msgEl.textContent = msgs[idx];
      msgEl.classList.remove('fade-out');
      msgEl.classList.add('fade-in');
    }, 420);
    const t = T[currentLang];
    countEl.textContent = msgCount === 1 ? t['support.count1'] : t['support.countN'](msgCount);
  }

  /* ============================================================
     PARTICLES (HOPE SECTION)
  ============================================================ */
  const particleWrap = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 20 + 6;
    p.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${Math.random()*6+5}s;animation-delay:${Math.random()*4}s;opacity:${Math.random()*0.35+0.1};background:${Math.random()>0.5?'rgba(212,119,138,0.22)':'rgba(155,127,168,0.22)'};`;
    particleWrap.appendChild(p);
  }

  /* ============================================================
     MODAL
  ============================================================ */
  function openModal() {
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  /* ============================================================
     MUSIC PLAYLIST
  ============================================================ */
  const playlist = [
    {
      title: "TWICE - The Best Thing I Ever Did",
      file: "The Best Thing I Ever Did Piano Cover.mp3"
    },
    {
      title: "TWICE - One In A Million",
      file: "ONE IN A MILLION  Piano Cover.mp3"
    },
    {
      title: "TWICE - Feel Special",
      file: "Feel Special PIANO COVER.mp3"
    }
  ];

  let currentSongIndex = 0;

  /* ============================================================
     MUSIC TOGGLE
  ============================================================ */
  const musicBtn  = document.getElementById('music-btn');
  const audio     = document.getElementById('bg-music');
  const songTitle = document.getElementById('song-title');

  let playing = false;

  function loadSong(index) {
    currentSongIndex = index;
    audio.src = playlist[index].file;
    songTitle.textContent = playlist[index].title;
  }

  function playMusic() {
    if (!audio.src) {
      loadSong(currentSongIndex);
    }

    audio.volume = 0.35;
    audio.play();
    playing = true;
    musicBtn.textContent = '⏭';
  }

  function nextSong() {
    currentSongIndex++;
    if (currentSongIndex >= playlist.length) {
      currentSongIndex = 0;
    }
    loadSong(currentSongIndex);
    audio.play();
  }

  musicBtn.addEventListener('click', () => {
    if (!playing) {
      playMusic();
    } else {
      nextSong();
    }
  });

  /* ============================================================
   MUSIC INTRO LOGIC
  ============================================================ */

  const overlay = document.getElementById('music-overlay');
  const musicYes = document.getElementById('music-yes');
  const musicNo  = document.getElementById('music-no');

  musicYes.addEventListener('click', () => {
    playMusic();
    overlay.style.display = 'none';
  });

  musicNo.addEventListener('click', () => {
    overlay.style.display = 'none';
  });

  /* ============================================================
     PARALLAX HERO
  ============================================================ */
  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    if (scrollY < window.innerHeight) {
      document.getElementById('hero').style.backgroundPositionY = (scrollY * 0.35) + 'px';
    }
  });

  /* ============================================================
     INIT — apply default language
  ============================================================ */
  applyLang(currentLang);
</script>
</body>
</html>
